<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WASM Env Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        #out { white-space: pre-wrap; margin-top: 10px; }
        .err { color: #f66; }
    </style>
</head>
<body>
    <h1>Emscripten Environment Test</h1>
    <p>Check the console (F12) for output. If you see "Hello from Emscripten!" and "Read from preload: Hello from preloaded file!" then preload works.</p>
    <div id="out"></div>
    <script>
        var Module = {
            locateFile: function(path) { return new URL(path, location.href).href; },
            print: function(t) { document.getElementById('out').textContent += t + '\n'; console.log(t); },
            printErr: function(t) { document.getElementById('out').innerHTML += '<span class="err">' + t + '</span>\n'; console.error(t); },
            onRuntimeInitialized: function() { document.getElementById('out').textContent += 'Runtime ready.\n'; }
        };
    </script>
    <script src="hello.js"></script>
</body>
</html>
