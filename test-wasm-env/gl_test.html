<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WASM OpenGL Test</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #0f0; font-family: monospace; padding: 10px; }
        canvas { display: block; background: #000; }
        #log { white-space: pre-wrap; margin-top: 10px; font-size: 12px; }
        .err { color: #f66; }
    </style>
</head>
<body>
    <h1>Emscripten OpenGL Test (Legacy GL Emulation)</h1>
    <p>If you see a colored triangle and "GL test OK" in the log, legacy GL works.</p>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="log"></div>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            locateFile: function(path) { return new URL(path, location.href).href; },
            print: function(t) {
                var el = document.getElementById('log');
                if (el) el.textContent += t + '\n';
                console.log(t);
            },
            printErr: function(t) {
                var el = document.getElementById('log');
                if (el) el.innerHTML += '<span class="err">' + t + '</span>\n';
                console.error(t);
            }
        };
    </script>
    <script src="gl_test.js"></script>
</body>
</html>
