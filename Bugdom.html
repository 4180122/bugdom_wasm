<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Bugdom</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%231a5f1a' width='32' height='32'/><circle fill='%23c00' cx='16' cy='16' r='10'/><circle fill='%23000' cx='12' cy='14' r='2'/><circle fill='%23000' cx='20' cy='14' r='2'/></svg>">
	<style>
		body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
		canvas { display: block; }
	</style>
</head>
<body>
	<canvas id="canvas" width="640" height="480"></canvas>
	<div id="error" style="display:none;color:red;padding:20px;font-family:monospace;white-space:pre-wrap;max-width:90vw;"></div>
	<script>
		window.addEventListener('unhandledrejection', function(e) {
			var err = document.getElementById('error');
			err.style.display = 'block';
			err.textContent = 'Unhandled rejection: ' + e.reason + '\n' + (e.reason && e.reason.stack || '');
			console.error('Unhandled rejection:', e.reason, e.reason && e.reason.stack);
		});
		window.addEventListener('error', function(e) {
			var err = document.getElementById('error');
			err.style.display = 'block';
			err.textContent = 'Error: ' + e.message + '\n' + (e.error && e.error.stack || e.filename + ':' + e.lineno);
			console.error('Error:', e.message, e.error && e.error.stack);
		});
		var Module = {
			canvas: (function(){
				var c = document.getElementById('canvas');
				c.width = 640;
				c.height = 480;
				return c;
			})(),
			locateFile: function(path) {
				return new URL(path, window.location.href).href;
			},
			print: function(text) { console.log(text); },
			printErr: function(text) { console.error(text); }
		};
	</script>
	<script src="Bugdom.js"></script>
</body>
</html>
